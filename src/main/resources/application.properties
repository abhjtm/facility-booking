# Server Configuration
server.port=8080

# Application Name
spring.application.name=facility-booking-service

# OpenAPI /  Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# MySQL Configuration
booking.storage.type=mysql
spring.datasource.url=jdbc:mysql://localhost:3306/facility_booking?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=booking_user
spring.datasource.password=bookingpassword
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

